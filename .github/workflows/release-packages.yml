name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"

jobs:
  linux-packages:
    name: Linux packages
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            dpkg-dev \
            git \
            libeigen3-dev \
            libhdf5-dev \
            libjsoncpp-dev \
            libopenblas-dev \
            libssl-dev \
            nlohmann-json3-dev \
            pkg-config

      - name: Configure package build
        run: |
          cmake -B build-package -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DUSE_GPU_ACCEL=OFF \
            -DICARION_BUILD_TESTS=OFF

      - name: Build packages
        run: cmake --build build-package -j"$(nproc)" --target package

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp build-package/icarion_*.deb release-assets/
          cp build-package/icarion-*-Linux.tar.gz release-assets/
          cp build-package/*.sha256 release-assets/
          ls -lh release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: icarion-linux-packages
          path: release-assets/*
          if-no-files-found: error

  windows-zip:
    name: Windows zip
    runs-on: windows-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore vcpkg dependency cache
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_INSTALLATION_ROOT }}/installed
            ${{ env.VCPKG_INSTALLATION_ROOT }}/packages
            ${{ env.VCPKG_INSTALLATION_ROOT }}/downloads
            vcpkg-cache
            .vcpkg-deps.stamp
          key: vcpkg-windows-x64-${{ hashFiles('.github/vcpkg-windows-deps.txt') }}
          restore-keys: |
            vcpkg-windows-x64-

      - name: Install build dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          Get-Content .github/vcpkg-windows-deps.txt |
            Where-Object { $_.Trim().Length -gt 0 } |
            ForEach-Object { & "$env:VCPKG_INSTALLATION_ROOT/vcpkg.exe" install $_.Trim() }
          "ok" | Set-Content .vcpkg-deps.stamp

      - name: Report cached build dependencies
        if: steps.vcpkg-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          Write-Host "Using cached vcpkg dependencies from $env:VCPKG_INSTALLATION_ROOT"

      - name: Configure package build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          cmake -B build-windows -S . -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD/dist/icarion" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_GPU_ACCEL=OFF `
            -DICARION_BUILD_TESTS=OFF

      - name: Build install tree
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          cmake --build build-windows --config Release --parallel *> build-windows/build.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::group::Windows build log tail"
            Get-Content build-windows/build.log -Tail 250
            Write-Host "::endgroup::"
            exit $LASTEXITCODE
          }
          cmake --install build-windows --config Release

      - name: Upload Windows build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: build-windows/build.log
          if-no-files-found: ignore

      - name: Bundle runtime DLLs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $bin = Join-Path $PWD "dist/icarion/bin"
          Get-ChildItem "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" -Filter "*.dll" |
            Copy-Item -Destination $bin -Force

      - name: Create Windows zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME } else { "manual-${env:GITHUB_RUN_NUMBER}" }
          $version = $tag -replace '^v',''
          $packageName = "icarion-$version-windows-x64"
          $packageRoot = "release-assets/$packageName"
          New-Item -ItemType Directory -Force $packageRoot | Out-Null

          Copy-Item -Path "dist/icarion/bin" -Destination "$packageRoot/bin" -Recurse -Force
          Copy-Item -Path "dist/icarion/share/icarion/data" -Destination "$packageRoot/data" -Recurse -Force
          Copy-Item -Path "dist/icarion/share/icarion/examples" -Destination "$packageRoot/examples" -Recurse -Force
          Copy-Item -Path "dist/icarion/share/icarion/schema" -Destination "$packageRoot/schema" -Recurse -Force
          Copy-Item -Path "dist/icarion/share/doc/ICARION" -Destination "$packageRoot/docs" -Recurse -Force

          Copy-Item -Path "README.md" -Destination "$packageRoot/README.md" -Force
          Copy-Item -Path "CHANGELOG.md" -Destination "$packageRoot/CHANGELOG.md" -Force
          Copy-Item -Path "LICENSE" -Destination "$packageRoot/LICENSE" -Force

          $zip = "release-assets/icarion-$version-windows-x64.zip"
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zip -Force
          Remove-Item -Recurse -Force $packageRoot
          Get-FileHash $zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $zip -Leaf)" } |
            Set-Content "$zip.sha256"
          Get-ChildItem release-assets | Format-Table Name, Length

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: icarion-windows-zip
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish draft release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - linux-packages
      - windows-zip

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release-assets/*
